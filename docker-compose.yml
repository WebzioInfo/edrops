version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: edrops-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: edrops
    ports:
      - "5432:5432"
    volumes:
      - edrops_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: edrops-redis
    ports:
      - "6379:6379"
    volumes:
      - edrops_redisdata:/data
    restart: unless-stopped

volumes:
  edrops_pgdata:
  edrops_redisdata:
